<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up | Answerly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body data-page="register">
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="./index.html">Answerly</a>
      <nav class="topbar-nav">
        <a class="nav-link" href="./login.html">Log in</a>
      </nav>
    </header>

    <main class="auth-layout">
      <section class="card card-accent intro-panel">
        <p class="eyebrow">Sign up</p>
        <h1>Create your Answerly account.</h1>
        <p class="lead">Sign up to start collecting student responses and AI feedback.</p>
      </section>

      <section class="card card-panel form-panel">
        <form id="registerForm" class="form-stack" novalidate>
          <label class="field">
            <span>Email</span>
            <input id="email" name="email" type="email" autocomplete="email" required>
          </label>
          <p id="emailError" class="field-error" aria-live="polite"></p>
          <label class="field">
            <span>Password</span>
            <input id="password" name="password" type="password" autocomplete="new-password" required>
          </label>
          <p id="passwordError" class="field-error" aria-live="polite"></p>
          <label class="field">
            <span>Account type</span>
            <select id="role" name="role">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </label>
          <p id="roleError" class="field-error" aria-live="polite"></p>
          <button class="button" type="submit">Create account</button>
        </form>

        <p id="formMessage" class="feedback-message" aria-live="polite"></p>
        <p class="helper-copy">Already have an account? <a href="./login.html">Log in</a>.</p>
      </section>
    </main>
  </div>

  <script type="module" src="./assets/js/pages/register-page.js"></script>
</body>
</html>
