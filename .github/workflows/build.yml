name: CI Build

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build Web APIs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore BCIT-COMP4945-AssignmentIII.sln

      - name: Build solution
        run: dotnet build BCIT-COMP4945-AssignmentIII.sln --configuration Release --no-restore

      - name: Publish Auth Service
        run: dotnet publish auth-service/AuthService/AuthService.csproj --configuration Release --no-build --output ./publish/auth-service

      - name: Publish Quiz Service
        run: dotnet publish quiz-service/QuizService/QuizService.csproj --configuration Release --no-build --output ./publish/quiz-service
